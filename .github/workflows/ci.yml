name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel earlier runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Prisma needs SOMETHING in DATABASE_URL at generate-time. The build only
      # runs `prisma generate` (no actual DB calls), so a placeholder URL is
      # safe — but it must be syntactically valid.
      DATABASE_URL: "mongodb+srv://placeholder:placeholder@example.com/iautomotive?retryWrites=true&w=majority"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (typecheck + bundle)
        run: npm run build
